name: determinism

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: determinism-${{ github.ref }}
  cancel-in-progress: true

jobs:
  byte-identical-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      LC_ALL: C.UTF-8
      LANG: C.UTF-8
      TZ: UTC
      PYTHONHASHSEED: "0"
      SOURCE_DATE_EPOCH: "0"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          # Pin ifcopenshell wheel to avoid serializer drift breaking byte-identical PDFs
          pip install "ifcopenshell==0.8.4" || pip install "ifcopenshell>=0.8.0"
          pip install -e ".[dev]"

      - name: Run determinism gate (PR scope, exclude slow)
        run: pytest tests/ -q -m "not slow"
